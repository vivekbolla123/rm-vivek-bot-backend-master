# The manifest for the "rm-bot-backend" service.
name: rm-bot-backend
type: Backend Service

http:
  path: '/api/rm-bot-backend'
  healthcheck:
    path: '/health'
    success_codes: '200'
    healthy_threshold: 2
    unhealthy_threshold: 3
    interval: 120s
    timeout: 30s
    grace_period: 300s
  alias: '${COPILOT_ENVIRONMENT_NAME}-rm.qp.akasaair.com'

network:
  vpc:
    placement: private

image:
  build: Dockerfile
  port: 8000

cpu: 512
memory: 1024
count: 1
exec: true
platform: linux/x86_64

