variables:
  DD_SERVICE: rm-bot-backend
  DD_ENV: ${COPILOT_ENVIRONMENT_NAME}
  DD_VERSION: "${GIT_REF}"
  DD_LOGS_INJECTION: "true"
  DD_TRACE_AGENT_URL: "http://127.0.0.1:8126"
  DD_TAGS: "git.commit.sha:${GIT_COMMIT_SHA},git.ref:${GIT_REF},Department:RM"
  
  MOCK_MODE: "false"
  AGENTCORE_REGION: "ap-south-1"
  AGENTCORE_QUALIFIER: "DEFAULT"
  AGENTCORE_READ_TIMEOUT: "120"

secrets:
  REDIS_PASSWORD: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/RM_CACHE_PASSWORD
  AWS_ACCESS_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/RM_WEBSERVICE_AWS_ACCESS_KEY_NEW_PROD
  AWS_SECRET_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/RM_WEBSERVICE_AWS_SECRET_KEY_NEW_PROD

environments:
  dev:
    count: 1
    variables:
      RM_WEBSERVICE_URL: "http://rm-webservice.dev.rm.local:8081/api/rm-webservice"
      REDIS_HOST: "ip-172-24-72-8.ap-south-1.compute.internal"
      REDIS_PORT: "6379"
      RM_BULK_ACTION_AGENT_ARN: "arn:aws:bedrock-agentcore:ap-south-1:891377165721:runtime/rm_bulk_action-lO7EcuHBzC"

  uat:
    count: 1
    http:
      alias: 'uat-rm.qp.akasaair.com'
    variables:
      RM_WEBSERVICE_URL: "http://rm-webservice.uat.rm.local:8081/api/rm-webservice"
      REDIS_HOST: "ip-172-24-72-8.ap-south-1.compute.internal"
      REDIS_PORT: "6379"
      RM_BULK_ACTION_AGENT_ARN: "arn:aws:bedrock-agentcore:ap-south-1:891377165721:runtime/rm_bulk_action-lO7EcuHBzC"

  prod:
    count: 2
    http:
      alias: 'prod-rm.qp.akasaair.com'
    variables:
      RM_WEBSERVICE_URL: "http://rm-webservice.prod.rm.local:8081/api/rm-webservice"
      REDIS_HOST: "ip-10-16-6-51.ap-south-1.compute.internal"
      REDIS_PORT: "6379"
      RM_BULK_ACTION_AGENT_ARN: "arn:aws:bedrock-agentcore:ap-south-1:891377165721:runtime/rm_bulk_action-lO7EcuHBzC"
